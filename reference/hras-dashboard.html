<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HR AI 场景价值看板 — CHO 决策视角</title>
<style>
  :root {
    --gold: #f59e0b; --silver: #94a3b8; --bronze: #d97706;
    --blue: #3b82f6; --green: #22c55e; --red: #ef4444;
    --purple: #8b5cf6; --cyan: #06b6d4; --pink: #ec4899;
    --bg: #f8fafc; --card: #ffffff; --border: #e2e8f0;
    --text: #1e293b; --text2: #64748b; --text3: #94a3b8;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family: -apple-system, 'SF Pro Display', 'Inter', 'PingFang SC', sans-serif; background: var(--bg); color: var(--text); line-height: 1.5; }

  /* Header */
  .header { background: var(--card); border-bottom: 1px solid var(--border); padding: 16px 24px; position: sticky; top: 0; z-index: 10; }
  .header-inner { max-width: 1200px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; }
  .header h1 { font-size: 18px; font-weight: 700; }
  .header p { font-size: 12px; color: var(--text3); margin-top: 2px; }

  /* Tabs */
  .tabs { display: flex; gap: 2px; background: #f1f5f9; border-radius: 8px; padding: 3px; }
  .tab { padding: 6px 16px; border-radius: 6px; border: none; background: none; font-size: 13px; font-weight: 500; color: var(--text2); cursor: pointer; transition: all .2s; }
  .tab.active { background: white; color: var(--text); box-shadow: 0 1px 3px rgba(0,0,0,.08); }
  .tab:hover:not(.active) { color: var(--text); }

  /* Layout */
  .container { max-width: 1200px; margin: 0 auto; padding: 20px 24px; }
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .grid4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
  .space > * + * { margin-top: 16px; }

  /* Card */
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; box-shadow: 0 1px 2px rgba(0,0,0,.04); }
  .card-head { padding: 14px 20px 10px; border-bottom: 1px solid #f1f5f9; }
  .card-head h3 { font-size: 12px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: .5px; }
  .card-head .sub { font-size: 11px; color: var(--text3); margin-top: 2px; }
  .card-body { padding: 18px 20px; }

  /* Metric */
  .metric-label { font-size: 10px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 4px; }
  .metric-value { font-size: 28px; font-weight: 800; line-height: 1.1; }
  .metric-sub { font-size: 11px; color: var(--text3); margin-top: 4px; }

  /* HBar */
  .hbar { display: flex; align-items: center; gap: 10px; padding: 5px 0; }
  .hbar-label { width: 100px; text-align: right; font-size: 12px; color: var(--text2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex-shrink: 0; }
  .hbar-track { flex: 1; height: 18px; background: #f1f5f9; border-radius: 9px; overflow: hidden; }
  .hbar-fill { height: 100%; border-radius: 9px; transition: width .6s ease; }
  .hbar-val { width: 60px; font-size: 11px; font-family: 'SF Mono', monospace; color: var(--text2); flex-shrink: 0; }

  /* Status pill */
  .pill { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 500; color: white; }

  /* Table */
  .tbl { width: 100%; border-collapse: collapse; font-size: 13px; }
  .tbl th { text-align: left; padding: 8px 10px; color: var(--text2); font-weight: 500; font-size: 11px; border-bottom: 1px solid var(--border); }
  .tbl td { padding: 8px 10px; border-bottom: 1px solid #f8fafc; }
  .tbl tr:hover { background: #f8fafc; }
  .tbl .mono { font-family: 'SF Mono', monospace; color: var(--text2); }
  .tbl .num { text-align: right; font-family: 'SF Mono', monospace; color: var(--text2); }

  /* Rank bar */
  .rank-item { display: flex; align-items: center; gap: 10px; padding: 6px 0; }
  .rank-badge { width: 26px; height: 26px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; color: white; flex-shrink: 0; }
  .rank-info { flex: 1; min-width: 0; }
  .rank-name { font-size: 13px; font-weight: 500; color: var(--text); display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  .rank-bar-track { margin-top: 4px; height: 16px; background: #f1f5f9; border-radius: 8px; overflow: hidden; }
  .rank-bar-fill { height: 100%; border-radius: 8px; display: flex; align-items: center; padding-left: 6px; transition: width .6s ease; }
  .rank-bar-text { font-size: 10px; color: white; font-family: 'SF Mono', monospace; white-space: nowrap; }
  .rank-stats { text-align: right; flex-shrink: 0; width: 70px; }
  .rank-stats div { font-size: 11px; }

  /* Alert box */
  .alert { padding: 12px 14px; border-radius: 8px; margin-top: 14px; font-size: 12px; }
  .alert-red { background: #fef2f2; border: 1px solid #fecaca; color: #b91c1c; }
  .alert-amber { background: #fffbeb; border: 1px solid #fde68a; color: #92400e; }
  .alert p + p { margin-top: 4px; }

  /* Gap card */
  .gap-card { border-radius: 8px; padding: 14px; border: 1px solid; }
  .gap-card.critical { background: #fef2f2; border-color: #fecaca; }
  .gap-card.medium { background: #fffbeb; border-color: #fde68a; }
  .gap-card.low { background: #f8fafc; border-color: #e2e8f0; }
  .gap-head { display: flex; justify-content: space-between; align-items: center; }
  .gap-sev { font-size: 11px; padding: 2px 8px; border-radius: 20px; font-weight: 500; }
  .gap-sev.critical { background: #fee2e2; color: #b91c1c; }
  .gap-sev.medium { background: #fef3c7; color: #92400e; }
  .gap-sev.low { background: #e2e8f0; color: #475569; }
  .gap-bar { height: 6px; background: #e2e8f0; border-radius: 3px; overflow: hidden; margin-top: 8px; }
  .gap-bar-fill { height: 100%; border-radius: 3px; }
  .gap-meta { font-size: 11px; font-family: monospace; color: var(--text2); }
  .gap-desc { font-size: 11px; color: var(--text2); margin-top: 6px; }
  .gap-fix { font-size: 11px; color: var(--blue); margin-top: 3px; }

  /* Stat boxes */
  .stat-box { border-radius: 10px; padding: 16px; text-align: center; }
  .stat-box .num { font-size: 32px; font-weight: 800; }
  .stat-box .label { font-size: 11px; color: var(--text2); margin-top: 2px; }

  /* Formula card */
  .formula-card { border-radius: 10px; padding: 14px; }
  .formula-card h4 { font-size: 13px; font-weight: 600; }
  .formula-card p { font-size: 11px; margin-top: 3px; }

  /* Funnel */
  .funnel { display: flex; align-items: flex-end; gap: 10px; height: 180px; padding: 0 10px; }
  .funnel-col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .funnel-bar { width: 100%; border-radius: 6px 6px 0 0; transition: height .5s ease; }
  .funnel-num { font-size: 16px; font-weight: 700; color: var(--text); }
  .funnel-label { font-size: 11px; color: var(--text2); text-align: center; line-height: 1.2; }

  /* Date fill */
  .date-fill { background: #f8fafc; border-radius: 10px; padding: 14px; text-align: center; }
  .date-fill .big { font-size: 22px; font-weight: 700; color: #cbd5e1; }
  .date-fill .lbl { font-size: 11px; color: var(--text2); margin-top: 4px; }
  .date-fill .bar { height: 4px; background: #e2e8f0; border-radius: 2px; margin-top: 8px; overflow: hidden; }
  .date-fill .bar-fill { height: 100%; background: var(--blue); border-radius: 2px; }

  .hidden { display: none; }
  .mt4 { margin-top: 16px; }
  .mb4 { margin-bottom: 16px; }
  @media (max-width: 768px) {
    .grid2, .grid4 { grid-template-columns: 1fr; }
    .header-inner { flex-direction: column; gap: 10px; }
  }
</style>
</head>

        </div>
        <div class="alert alert-amber" style="margin-top:12px">
          <span style="font-weight:600">${progMap["未标记"]} / ${D.length} 场景未标记进展</span> — 建议设为必填字段
        </div>
      </div>
    </div>
    <div class="card">
      <div class="card-head"><h3>大赛参赛状态</h3><div class="sub">AI 大赛 vs AI 许愿 的场景分布与评审进度</div></div>
      <div class="card-body">
        <div class="grid2" style="gap:10px">
          <div class="stat-box" style="background:#eff6ff;padding:12px"><div class="num" style="color:#3b82f6;font-size:28px">${contestIn}</div><div class="label">AI大赛 · 评审中</div></div>
          <div class="stat-box" style="background:#f0fdf4;padding:12px"><div class="num" style="color:#16a34a;font-size:28px">0</div><div class="label">AI大赛 · 终审通过</div></div>
          <div class="stat-box" style="background:#fef2f2;padding:12px"><div class="num" style="color:#ef4444;font-size:28px">0</div><div class="label">AI大赛 · 取消</div></div>
          <div class="stat-box" style="background:#f5f3ff;padding:12px"><div class="num" style="color:#8b5cf6;font-size:28px">${contestOut}</div><div class="label">AI许愿 · 未参赛</div></div>
        </div>
      </div>
    </div>
  </div>`;
}

function renderPipeline(){
  const maxP=Math.max(...STAGES.map(s=>progMap[s]),1);
  return `
  <div class="card mb4">
    <div class="card-head"><h3>落地进展漏斗</h3><div class="sub">场景从启动到全面上线的推进状态</div></div>
    <div class="card-body">
      <div class="funnel">
        ${STAGES.map(s=>{const c=progMap[s];const h=Math.max((c/maxP)*150,4);return `<div class="funnel-col"><div class="funnel-num">${c}</div><div class="funnel-bar" style="height:${h}px;background:${SC[s]}"></div><div class="funnel-label">${s}</div></div>`;}).join("")}
      </div>
      <div class="alert alert-red">
        <p style="font-weight:600">⚠ 关键问题：${progMap["未标记"]} / ${D.length} 个场景未标记落地进展</p>
        <p>绝大多数场景缺乏进度追踪数据，CHO 无法判断实际推进节奏。建议：将「落地进展」设为必填字段，建立每周/每月更新机制。</p>
      </div>
    </div>
  </div>
  <div class="card mb4">
    <div class="card-head"><h3>里程碑日期填写率</h3><div class="sub">构建时间线视图、做价值排期的数据基础</div></div>
    <div class="card-body">
      <div class="grid4">
        ${["计划启动日期","试点上线日期","推广上线日期","全面上线日期"].map(f=>`<div class="date-fill"><div class="big">~0/${D.length}</div><div class="lbl">${f}</div><div class="bar"><div class="bar-fill" style="width:0%"></div></div></div>`).join("")}
      </div>
      <div class="alert alert-amber" style="margin-top:12px">
        里程碑日期几乎全部为空 → 无法构建时间线视图，无法做价值排期。建议：至少对 Top 10 高价值场景补填计划和实际上线日期。
      </div>
    </div>
  </div>
  <div class="card">
    <div class="card-head"><h3>各场景落地进展一览</h3><div class="sub">按价值排名展示每个场景的当前状态</div></div>
    <div class="card-body" style="overflow-x:auto">
      <table class="tbl"><thead><tr>
        <th>排名</th><th>场景</th><th>分类</th><th>等级</th><th>落地进展</th><th style="text-align:right">月节省</th>
      </tr></thead><tbody>
        ${[...D].sort((a,b)=>a.rank-b.rank).map(d=>`<tr>
          <td class="mono">#${d.rank}</td>
          <td><span class="mono" style="color:var(--text3);margin-right:4px">${d.id}</span>${d.name.length>26?d.name.slice(0,26)+"…":d.name}</td>
          <td><span class="pill" style="background:${CC[d.cat]||"#6b7280"}">${d.cat}</span></td>
          <td><span class="pill" style="background:${TC[d.tier]};width:20px;height:20px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center">${d.tier}</span></td>
          <td>${d.prog?`<span class="pill" style="background:${SC[d.prog]}">${d.prog}</span>`:'<span style="color:#cbd5e1;font-size:12px">— 未填</span>'}</td>
          <td class="num">${fmt(d.totalS)}h</td>
        </tr>`).join("")}
      </tbody></table>
    </div>
  </div>`;
}

function renderValue(){
  const maxVS=D[0].vs;
  return `
  <div class="card mb4">
    <div class="card-head"><h3>Top 10 高价值场景</h3><div class="sub">按最终价值计分排名 = 月均节省总工时 × 地区系数 × 复用系数</div></div>
    <div class="card-body">
      ${[...D].sort((a,b)=>a.rank-b.rank).slice(0,10).map((d,i)=>{
        const pct=(d.vs/maxVS)*100;
        const bg=i<3?"#f59e0b":"#e2e8f0";const fg=i<3?"#fff":"#64748b";
        return `<div class="rank-item">
          <div class="rank-badge" style="background:${bg}">${d.rank}</div>
          <div class="rank-info">
            <div class="rank-name">
              ${d.name}
              <span class="pill" style="background:${TC[d.tier]};font-size:10px">${d.tier}</span>
              <span style="font-size:11px;color:var(--text3)">${d.cat}</span>
            </div>
            <div class="rank-bar-track">
              <div class="rank-bar-fill" style="width:${Math.max(pct,3)}%;background:linear-gradient(90deg,${TC[d.tier]}cc,${TC[d.tier]}55)">
                ${pct>15?`<span class="rank-bar-text">${fmtF(Math.round(d.vs))}</span>`:""}
              </div>
            </div>
          </div>
          <div class="rank-stats">
            <div class="mono" style="color:var(--text)">${fmt(d.totalS)}h/月</div>
            <div style="color:var(--text3)">${(d.ratio*100).toFixed(0)}% 提效</div>
          </div>
        </div>`;
      }).join("")}
    </div>
  </div>
  <div class="card mb4">
    <div class="card-head"><h3>价值计分公式解读</h3><div class="sub">最终价值计分 = 月均节省总工时 × 地区系数 × 复用系数</div></div>
    <div class="card-body">
      <div class="grid2">
        <div class="formula-card" style="background:#eff6ff">
          <h4 style="color:#1e40af">月均节省总工时</h4>
          <p style="color:#3b82f6">= 月均提效节省工时 + 月均降本折算工时</p>
          <p style="color:#60a5fa">降本折算：月均降本费用 ÷ (50 × 地区系数)</p>
        </div>
        <div class="formula-card" style="background:#f0fdf4">
          <h4 style="color:#166534">场景归属地区系数</h4>
          <p style="color:#16a34a">国内 ×1 · 海外 ×2 · 全球 ×1.5</p>
          <p style="color:#4ade80">基于全球 HR 人力成本水平</p>
        </div>
      </div>
      <div style="margin-top:12px">
        <div class="formula-card" style="background:#fffbeb">
          <h4 style="color:#92400e">推广复用价值系数</h4>
          <p style="color:#d97706">个人 ×1 · BU 内 ×2 · 跨 BU ×3 · 全集团 ×4</p>
          <p style="color:#f59e0b">复用范围越广，价值倍数越高</p>
        </div>
      </div>
    </div>
  </div>
  <div class="card">
    <div class="card-head"><h3>核心价值分布</h3><div class="sub">提效 vs 降本的场景区分</div></div>
    <div class="card-body">
      <div class="grid2">
        <div class="stat-box" style="background:#fff7ed">
          <div class="num" style="color:#f97316">${D.filter(d=>d.val==="提效").length}</div>
          <div class="label">提效型场景</div>
          <div style="font-size:11px;color:var(--text3);margin-top:2px">以节省人力工时为核心</div>
        </div>
        <div class="stat-box" style="background:#ecfdf5">
          <div class="num" style="color:#10b981">${D.filter(d=>d.val.includes("降本")).length}</div>
          <div class="label">降本型场景</div>
          <div style="font-size:11px;color:var(--text3);margin-top:2px">直接降低非人力运营成本</div>
        </div>
      </div>
    </div>
  </div>`;
}

function renderGaps(){
  const gaps = [
    {field:"落地进展",filled:D.filter(d=>d.prog).length,total:D.length,sev:"critical",impact:"无法展示进度漏斗，CHO 无法判断整体推进节奏",fix:"将「落地进展」设为必填字段，要求各场景负责人每周更新"},
    {field:"里程碑日期（4个日期字段）",filled:2,total:D.length*4,sev:"critical",impact:"无法构建时间线视图，无法做价值排期预测",fix:"至少对 Top 10 场景补填计划启动/试点/推广/全面上线日期"},
    {field:"提报团队",filled:D.filter(d=>d.team).length,total:D.length,sev:"medium",impact:"9 个 AI 许愿场景无法归因到团队，团队贡献排名不完整",fix:"AI 许愿场景补填提报团队"},
    {field:"新月均耗时",filled:D.filter(d=>d.newH>0||(d.oldH>0&&d.savedH>0)).length,total:D.length,sev:"medium",impact:"部分场景仅有原工时、无新工时，提效比例无法计算",fix:"对已进入试点/上线阶段的场景补充 AI 化后的实际耗时"},
    {field:"月均降本费用",filled:D.filter(d=>d.cost>0).length,total:D.length,sev:"low",impact:"仅 3 个场景有降本数据，总降本金额不完整",fix:"如有外部费用节省（外包、工具订阅），请补充"},
  ];
  return `
  <div class="card">
    <div class="card-head"><h3>数据完整性诊断</h3><div class="sub">CHO 看板依赖这些数据 — 以下是当前数据质量的关键缺口</div></div>
    <div class="card-body space">
      ${gaps.map(g=>`
        <div class="gap-card ${g.sev}">
          <div class="gap-head">
            <span style="font-size:13px;font-weight:600;color:var(--text)">${g.field}</span>
            <span class="gap-sev ${g.sev}">${g.sev==="critical"?"严重":g.sev==="medium"?"中等":"轻微"}</span>
          </div>
          <div style="display:flex;align-items:center;gap:10px;margin-top:8px">
            <div class="gap-bar" style="flex:1"><div class="gap-bar-fill" style="width:${(g.filled/g.total)*100}%;background:${g.sev==="critical"?"#f87171":"#fbbf24"}"></div></div>
            <span class="gap-meta">${g.filled}/${g.total}</span>
          </div>
          <div class="gap-desc">${g.impact}</div>
          <div class="gap-fix">→ ${g.fix}</div>
        </div>
      `).join("")}
    </div>
  </div>`;
}

// ── Tab Switching ──
const renderers = {overview:renderOverview,pipeline:renderPipeline,value:renderValue,gaps:renderGaps};
const el = document.getElementById("content");
function switchTab(key){
  el.innerHTML = renderers[key]();
  document.querySelectorAll(".tab").forEach(t=>{t.classList.toggle("active",t.dataset.tab===key);});
}
document.getElementById("tabs").addEventListener("click",e=>{
  if(e.target.classList.contains("tab"))switchTab(e.target.dataset.tab);
});
switchTab("overview");
</script>
</body>
</html>
